{% load static %}
<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kirish | EduOlimp</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="{% static 'css/login.css' %}">

</head>
<body>
    <div class="auth-card">
        <div class="banner-side">
            <h2>Edu<span>Olimp</span></h2>
            <img src="https://illustrations.popsy.co/white/studying.svg" alt="Illustration">
        </div>

        <div class="form-side">
            <div class="header">
                <h3>Tizimga kirish</h3>
                <p>Ma'lumotlaringizni kiriting</p>
            </div>

            <form id="loginForm" method="POST" action="{% url 'student_login' %}">
                {% csrf_token %}
                <div class="input-group">
                    <label>E-mail yoki ID</label>
                    <div class="input-wrapper">
                        <i class="fas fa-envelope"></i>
                        <input type="text" name="username" placeholder="misol@gmail.com" required>
                    </div>
                </div>

                <div class="input-group">
                    <label>Parol</label>
                    <div class="input-wrapper">
                        <i class="fas fa-lock"></i>
                        <input type="password" name="password" id="password" placeholder="••••••••" required>
                        <i class="fas fa-eye-slash toggle-pass" id="togglePassword"></i>
                    </div>
                </div>

                <div class="options">
                    <a href="#">Parol unutildimi?</a>
                </div>

                <button type="submit" class="login-btn">
                    <span>Kirish</span>
                    <i class="fas fa-arrow-right"></i>
                </button>
            </form>

            <div class="social-area">
                <span>Yoki quyidagilar orqali kiring:</span>
                <div class="social-icons">
                    <a href="{% url 'google_login' %}" class="social-btn google-btn" title="Google orqali kirish">
                        <svg width="18" height="18" viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
                            <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
                            <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
                            <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
                            <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
                            <path fill="none" d="M0 0h48v48H0z"/>
                        </svg>
                        <span>Google bilan kirish</span>
                    </a>
                </div>
            </div>
        </div>
    </div>

    <script src="{% static 'js/login.js' %}"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script>
        {% if messages %}
            {% for message in messages %}
                {% if message.tags == 'error' %}
                    Swal.fire({
                        icon: 'error',
                        text: '{{ message }}',
                        toast: true,
                        position: 'top',
                        showConfirmButton: false,
                        timer: 4000,
                        timerProgressBar: true,
                        didOpen: (toast) => {
                            toast.addEventListener('mouseenter', Swal.stopTimer)
                            toast.addEventListener('mouseleave', Swal.resumeTimer)
                        }
                    });
                {% endif %}
                {% if message.tags == 'success' %}
                    Swal.fire({
                        icon: 'success',
                        text: '{{ message }}',
                        toast: true,
                        position: 'top',
                        showConfirmButton: false,
                        timer: 3000,
                        timerProgressBar: true,
                    });
                {% endif %}
            {% endfor %}
        {% endif %}
    </script>
</body>
</html>
