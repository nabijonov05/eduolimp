{% load static %}
<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kirish | EduOlimp</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="{% static 'css/login.css' %}">
</head>
<body>
    <div class="auth-card">
        <div class="banner-side">
            <h2>Edu<span>Olimp</span></h2>
            <p>Bilimlar olamiga xush kelibsiz!</p>
            <img src="https://illustrations.popsy.co/white/studying.svg" alt="Illustration">
        </div>

        <div class="form-side">
            <div class="header">
                <h3>Tizimga kirish</h3>
                <p>Ma'lumotlaringizni kiriting</p>
            </div>

            <form id="loginForm" method="POST" action="{% url 'student_login' %}">
                {% csrf_token %}
                <div class="input-group">
                    <label>E-mail yoki ID</label>
                    <div class="input-wrapper">
                        <i class="fas fa-envelope"></i>
                        <input type="text" name="username" placeholder="misol@gmail.com" required>
                    </div>
                </div>

                <div class="input-group">
                    <label>Parol</label>
                    <div class="input-wrapper">
                        <i class="fas fa-lock"></i>
                        <input type="password" name="password" id="password" placeholder="••••••••" required>
                        <i class="fas fa-eye-slash toggle-pass" id="togglePassword"></i>
                    </div>
                </div>

                <div class="options">
                    <a href="#">Parol unutildimi?</a>
                </div>

                <button type="submit" class="login-btn">
                    <span>Kirish</span>
                    <i class="fas fa-arrow-right"></i>
                </button>
            </form>

            <div class="social-area">
                <span>Yoki quyidagilar orqali:</span>
                <div class="social-icons">
                    <a href="#"><i class="fab fa-google"></i></a>
                    <a href="#"><i class="fab fa-telegram"></i></a>
                </div>
            </div>
        </div>
    </div>

    <script src="{% static 'js/login.js' %}"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script>
        {% if messages %}
            {% for message in messages %}
                /* Faqat xatolik xabarlarini ko'rsatish uchun shart */
                {% if message.tags == 'error' %}
                    Swal.fire({
                        icon: 'error',
                        text: '{{ message }}',
                        toast: true,
                        position: 'top',
                        showConfirmButton: false,
                        timer: 4000,
                        timerProgressBar: true,
                        didOpen: (toast) => {
                            toast.addEventListener('mouseenter', Swal.stopTimer)
                            toast.addEventListener('mouseleave', Swal.resumeTimer)
                        }
                    });
                {% endif %}
            {% endfor %}
        {% endif %}
    </script>
</body>
</html>
